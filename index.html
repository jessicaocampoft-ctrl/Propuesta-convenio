<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta Jessica Ocampo</title>
    <style>
        :root { --fondo: #0f172a; --amarillo: #facc15; --blanco: #ffffff; }
        body { background-color: var(--fondo); color: var(--blanco); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .header { display: flex; align-items: center; justify-content: space-between; width: 90%; max-width: 800px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 50px; }
        .perfil { border-left: 3px solid var(--amarillo); padding-left: 15px; display: flex; align-items: center; text-align: left; }
        .logo-img { height: 60px; margin-right: 15px; }
        .btn { padding: 15px 30px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn-si { background-color: var(--amarillo); color: #000; }
        .btn-no { background-color: #e2e8f0; color: #1e293b; position: absolute; }
    </style>
</head>
<body>
    <div class="header">
        <div style="text-align: left;">
            <div style="color: var(--amarillo); font-weight: bold; text-transform: uppercase;">Propuesta de Convenio</div>
            <div style="font-size: 14px; color: #cbd5e1;">Readaptación Funcional</div>
        </div>
        <div class="perfil">
          <img src="1 (4).png" alt="Logo" class="logo-img">
            <div style="font-size: 11px;">
                <strong>Jessica Ocampo</strong><br>Fisioterapeuta<br>+57 313 6467945
            </div>
        </div>
    </div>
    <h1 style="text-align: center;">¿Aceptas iniciar esta alianza estratégica?</h1>
    <div style="height: 100px; position: relative; width: 100%; display: flex; justify-content: center; gap: 20px;">
        <button class="btn btn-si" onclick="alert('¡Alianza confirmada! 🚀')">¡SÍ, CLARO!</button>
        <button class="btn btn-no" id="btnNo" onmouseover="mover()">QUIZÁS LUEGO...</button>
    </div>
    <script>
        function mover() {
            const b = document.getElementById('btnNo');
            b.style.left = Math.random() * (window.innerWidth - 150) + 'px';
            b.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }
    </script>
</body>
</html>
